<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  
  @media (prefers-color-scheme: light) {
    .hub rect { fill: #E1F5EE; stroke: #0F6E56; }
    .hub .th { fill: #085041; }
    .hub .ts { fill: #0F6E56; }
    .spoke rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .spoke .th { fill: #444441; }
    .spoke .ts { fill: #5F5E5A; }
    .arr { stroke: #888780; }
    .caption { fill: #5F5E5A; }
  }
  @media (prefers-color-scheme: dark) {
    .hub rect { fill: #085041; stroke: #5DCAA5; }
    .hub .th { fill: #9FE1CB; }
    .hub .ts { fill: #5DCAA5; }
    .spoke rect { fill: #444441; stroke: #B4B2A9; }
    .spoke .th { fill: #D3D1C7; }
    .spoke .ts { fill: #B4B2A9; }
    .arr { stroke: #B4B2A9; }
    .caption { fill: #B4B2A9; }
  }
</style>

<g class="hub">
  <rect x="240" y="40" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">Overview project</text>
  <text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">Origin (empty hub)</text>
</g>

<line x1="270" y1="96" x2="150" y2="200" class="arr" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="96" x2="340" y2="200" class="arr" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="410" y1="96" x2="530" y2="200" class="arr" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="spoke">
  <rect x="60" y="200" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="150" y="218" text-anchor="middle" dominant-baseline="central">Security project</text>
  <text class="ts" x="150" y="238" text-anchor="middle" dominant-baseline="central">Linked (data)</text>
</g>

<g class="spoke">
  <rect x="250" y="200" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Observability project</text>
  <text class="ts" x="340" y="238" text-anchor="middle" dominant-baseline="central">Linked (data)</text>
</g>

<g class="spoke">
  <rect x="440" y="200" width="180" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="530" y="218" text-anchor="middle" dominant-baseline="central">Elasticsearch project</text>
  <text class="ts" x="530" y="238" text-anchor="middle" dominant-baseline="central">Linked (data)</text>
</g>

<text class="ts caption" x="340" y="300" text-anchor="middle">Searches run from the overview project across all linked projects.</text>
<text class="ts caption" x="340" y="318" text-anchor="middle">Linked projects operate independently and are not linked to each other.</text>
<text class="ts caption" x="340" y="336" text-anchor="middle">You can link any combination of compatible projects.</text>
</svg>
